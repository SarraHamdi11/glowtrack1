services:
  - type: web
    name: glowtrack-api
    runtime: node
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server build && pnpm --filter @workspace/db push
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: ENABLE_PNPM
        value: true
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api/healthz
